<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Voltify — Grid Operations Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080b11;
    --bg-2:      #0b0f17;
    --panel:     #0e131d;
    --panel-2:   #121826;
    --line:      #1c2434;
    --line-soft: #161d2b;
    --text:      #e7edf5;
    --muted:     #6d7a8f;
    --dim:       #475065;
    --cyan:      #2fe6cf;
    --cyan-dim:  #157e74;
    --amber:     #ffb020;
    --red:       #ff5a4d;
    --green:     #36d99a;
    --blue:      #4f8bff;
    --violet:    #b58cff;
    --glow-red:  rgba(255,90,77,.45);
    --glow-grn:  rgba(54,217,154,.40);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    display: grid;
    grid-template-columns: 1.55fr 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
    color: var(--text);
    font: 14px/1.5 "IBM Plex Sans", system-ui, sans-serif;
    background:
      radial-gradient(1200px 700px at 18% -10%, rgba(47,230,207,.06), transparent 60%),
      radial-gradient(900px 600px at 110% 120%, rgba(79,139,255,.07), transparent 55%),
      var(--bg);
    overflow: hidden;
  }
  /* faint engineering grid wash over everything */
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(120,150,200,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,150,200,.035) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: radial-gradient(120% 120% at 50% 30%, #000 55%, transparent 100%);
  }

  /* ───────── LEFT : VIEWPORT ───────── */
  #left {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    padding: 16px 16px 18px 20px;
    min-width: 0; min-height: 0;
  }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 2px 4px 16px;
  }
  .brand { display: flex; flex-direction: column; line-height: 1; }
  .brand .mark {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; font-size: 25px; letter-spacing: .14em;
    color: var(--text);
  }
  .brand .mark b { color: var(--cyan); font-weight: 700; }
  .brand .sub {
    margin-top: 6px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; letter-spacing: .34em; text-transform: uppercase;
    color: var(--dim);
  }

  /* status pill */
  #status {
    font-family: "IBM Plex Mono", monospace;
    font-weight: 600; font-size: 11.5px; letter-spacing: .18em;
    text-transform: uppercase;
    padding: 7px 14px 6px; border-radius: 4px;
    border: 1px solid var(--line);
    color: var(--muted); background: var(--panel);
    display: inline-flex; align-items: center; gap: 8px;
    position: relative;
  }
  #status::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--dim); box-shadow: 0 0 0 0 transparent;
  }
  #status.overloaded {
    color: #ffd9d4; border-color: rgba(255,90,77,.5);
    background: linear-gradient(180deg, rgba(255,90,77,.16), rgba(255,90,77,.05));
  }
  #status.overloaded::before { background: var(--red); animation: pulse 1.1s infinite; }
  #status.rescued {
    color: #c6ffe7; border-color: rgba(54,217,154,.5);
    background: linear-gradient(180deg, rgba(54,217,154,.14), rgba(54,217,154,.04));
  }
  #status.rescued::before { background: var(--green); box-shadow: 0 0 10px var(--glow-grn); }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 var(--glow-red); }
    70%  { box-shadow: 0 0 0 7px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  /* rho gauge */
  #rho {
    display: flex; align-items: center; gap: 10px;
    font-family: "IBM Plex Mono", monospace; font-size: 11px;
    color: var(--muted); letter-spacing: .04em;
  }
  #rho .lbl { color: var(--dim); text-transform: uppercase; letter-spacing: .2em; font-size: 9.5px; }
  #rho .track {
    width: 132px; height: 6px; border-radius: 3px;
    background: #10151f; border: 1px solid var(--line-soft);
    position: relative; overflow: hidden;
  }
  /* thermal limit marker at rho = 1.0 (track maps 0..1.5) */
  #rho .track::after {
    content: ""; position: absolute; top: -2px; bottom: -2px; left: 66.6%;
    width: 1px; background: rgba(255,255,255,.35);
  }
  #rho .fill {
    position: absolute; inset: 0 auto 0 0; width: 0%;
    background: linear-gradient(90deg, var(--cyan-dim), var(--cyan));
    transition: width .6s cubic-bezier(.2,.7,.2,1), background .4s;
  }
  #rho .val { color: var(--text); font-weight: 600; min-width: 42px; }

  #viewtoggle {
    margin-left: auto;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted); cursor: pointer; user-select: none;
    padding: 7px 12px; border: 1px solid var(--line); border-radius: 4px;
    background: var(--panel); transition: .18s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  #viewtoggle::before { content: "⤢"; color: var(--cyan); font-size: 13px; }
  #viewtoggle:hover { color: var(--text); border-color: var(--cyan-dim); }

  /* viewport frame */
  #gridwrap {
    flex: 1; position: relative; border-radius: 8px;
    background: #060a0f;
    border: 1px solid var(--line);
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.015), 0 18px 60px -30px #000;
    transition: box-shadow .5s, border-color .5s;
  }
  body[data-status="overloaded"] #gridwrap {
    border-color: rgba(255,90,77,.4);
    box-shadow: inset 0 0 80px -40px var(--glow-red), 0 18px 60px -30px #000;
  }
  body[data-status="rescued"] #gridwrap {
    border-color: rgba(54,217,154,.35);
    box-shadow: inset 0 0 80px -45px var(--glow-grn), 0 18px 60px -30px #000;
  }
  /* corner brackets */
  #gridwrap .bracket {
    position: absolute; width: 18px; height: 18px; z-index: 3; pointer-events: none;
    border: 2px solid var(--cyan); opacity: .55;
  }
  #gridwrap .bracket.tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
  #gridwrap .bracket.tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
  #gridwrap .bracket.bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
  #gridwrap .bracket.br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }
  /* scanline sheen */
  #gridwrap::after {
    content: ""; position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 2px, transparent 2px 4px);
    mix-blend-mode: screen;
  }
  iframe { position: relative; z-index: 1; width: 100%; height: 100%; border: 0; background: #060a0f; }
  #emptygrid {
    position: absolute; inset: 0; z-index: 4; display: grid; place-items: center;
    color: var(--dim); pointer-events: none;
    font-family: "IBM Plex Mono", monospace; font-size: 12px;
    letter-spacing: .22em; text-transform: uppercase;
  }
  #emptygrid::after { content: " ▮"; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  #emptygrid.hidden { display: none; }

  /* ───────── RIGHT : COMMS ───────── */
  #right {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    background: linear-gradient(180deg, var(--bg-2), var(--bg));
    border-left: 1px solid var(--line);
    min-width: 0; min-height: 0;
  }
  #commshead {
    display: flex; align-items: center; gap: 10px;
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--line-soft);
  }
  #commshead .t {
    font-family: "Chakra Petch", sans-serif; font-weight: 600;
    font-size: 12px; letter-spacing: .26em; text-transform: uppercase;
    color: var(--muted);
  }
  #commshead .live {
    margin-left: auto; display: inline-flex; align-items: center; gap: 7px;
    font-family: "IBM Plex Mono", monospace; font-size: 10px;
    letter-spacing: .2em; color: var(--green);
  }
  #commshead .live::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--glow-grn);
    animation: pulse-g 1.6s infinite;
  }
  @keyframes pulse-g { 50% { opacity: .35; } }

  #feed {
    flex: 1; min-height: 0; overflow-y: auto; padding: 16px 18px 8px;
    display: flex; flex-direction: column; gap: 12px;
    scrollbar-width: thin; scrollbar-color: var(--line) transparent;
  }
  #feed::-webkit-scrollbar { width: 8px; }
  #feed::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .msg { max-width: 94%; animation: rise .35s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } }

  /* markdown rendering inside messages */
  .msg.md { white-space: normal; }
  .msg.md .ln { min-height: 1em; }
  .msg.md .ln:empty { display: none; }
  .msg.md strong { color: #fff; font-weight: 600; }
  .msg.md em { font-style: italic; }
  .msg.md code {
    font-family: "IBM Plex Mono", monospace; font-size: .88em;
    background: rgba(255,255,255,.08); padding: 1px 5px;
    border-radius: 4px; border: 1px solid var(--line-soft);
  }
  .msg.md pre {
    background: rgba(0,0,0,.3); border: 1px solid var(--line);
    border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: 6px 0;
  }
  .msg.md pre code { background: none; border: none; padding: 0; }
  .msg.md ul, .msg.md ol { margin: 4px 0; padding-left: 20px; }
  .msg.md li { margin: 2px 0; }
  .msg.md h1, .msg.md h2, .msg.md h3, .msg.md h4 {
    margin: 6px 0 3px; font-weight: 600; line-height: 1.25;
  }
  .msg.md h1 { font-size: 1.25em; }
  .msg.md h2 { font-size: 1.15em; }
  .msg.md h3 { font-size: 1.05em; }
  .msg.md h4 { font-size: 1em; }
  .msg.md a { color: var(--blue); text-decoration: underline; }
  .msg.md blockquote {
    margin: 4px 0; padding-left: 10px;
    border-left: 2px solid var(--line); color: var(--muted);
  }

  /* operator command */
  .operator {
    align-self: flex-end; max-width: 88%;
    background: linear-gradient(180deg, rgba(79,139,255,.16), rgba(79,139,255,.06));
    border: 1px solid rgba(79,139,255,.3);
    border-radius: 9px 9px 3px 9px;
    padding: 9px 13px; color: #e8eefb;
    position: relative;
  }
  .operator::before {
    content: "OPERATOR"; display: block; margin-bottom: 4px;
    font-family: "IBM Plex Mono", monospace; font-size: 9px;
    letter-spacing: .22em; color: var(--blue);
  }

  /* agent narration */
  .narration {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-left: 2px solid var(--cyan);
    border-radius: 3px 9px 9px 9px;
    padding: 10px 14px; color: #d4dde9; white-space: pre-wrap;
  }
  .narration::before {
    content: "◆ AGENT"; display: block; margin-bottom: 5px;
    font-family: "IBM Plex Mono", monospace; font-size: 9px;
    letter-spacing: .2em; color: var(--cyan);
  }
  .narration.ops::before { content: "◆ OPS"; }
  .narration.screening,
  .verdict.screening {
    align-self: flex-start;
    background: linear-gradient(180deg, rgba(181,140,255,.12), rgba(181,140,255,.04));
    border: 1px solid rgba(181,140,255,.28);
    border-left: 2px solid var(--violet);
    border-radius: 3px 9px 9px 9px;
    padding: 10px 14px; color: #eadfff; white-space: pre-wrap;
  }
  .narration.screening::before,
  .verdict.screening::before {
    content: "◆ SCREENING"; display: block; margin-bottom: 5px;
    font-family: "IBM Plex Mono", monospace; font-size: 9px;
    letter-spacing: .2em; color: var(--violet);
  }
  .narration.weather,
  .constraint.weather,
  .event.weather {
    align-self: stretch; max-width: 100%;
    background: linear-gradient(180deg, rgba(255,196,87,.12), rgba(255,196,87,.04));
    border: 1px solid rgba(255,196,87,.28);
    border-left: 2px solid var(--amber);
    border-radius: 3px 9px 9px 9px;
    padding: 10px 14px; color: #ffeccb;
  }
  .narration.weather::before,
  .constraint.weather::before,
  .event.weather::before {
    content: "◆ WEATHER"; display: block; margin-bottom: 5px;
    font-family: "IBM Plex Mono", monospace; font-size: 9px;
    letter-spacing: .2em; color: var(--amber);
  }
  .event.weather::before { content: "☀ THERMAL DERATE"; }

  /* forced outage events */
  .event.outage {
    align-self: stretch; max-width: 100%;
    background: linear-gradient(180deg, rgba(255,107,107,.14), rgba(255,107,107,.04));
    border: 1px solid rgba(255,107,107,.3);
    border-left: 2px solid #ff6b6b;
    border-radius: 3px 9px 9px 9px;
    padding: 10px 14px; color: #ffd9d9;
  }
  .event.outage::before {
    content: "⚠ FORCED OUTAGE"; display: block; margin-bottom: 5px;
    font-family: "IBM Plex Mono", monospace; font-size: 9px;
    letter-spacing: .2em; color: #ff6b6b;
  }
  .narration.asset_health,
  .verdict.asset_health,
  .veto.asset_health {
    align-self: flex-start;
    background: linear-gradient(180deg, rgba(255,107,107,.12), rgba(255,107,107,.04));
    border: 1px solid rgba(255,107,107,.28);
    border-left: 2px solid #ff6b6b;
    border-radius: 3px 9px 9px 9px;
    padding: 10px 14px; color: #ffd9d9; white-space: pre-wrap;
  }
  .narration.asset_health::before,
  .verdict.asset_health::before {
    content: "◆ ASSET HEALTH"; display: block; margin-bottom: 5px;
    font-family: "IBM Plex Mono", monospace; font-size: 9px;
    letter-spacing: .2em; color: #ff6b6b;
  }
  .veto.asset_health::before {
    content: "■ ASSET HEALTH — VETO"; display: block; margin-bottom: 5px;
    font-family: "IBM Plex Mono", monospace; font-size: 9px;
    letter-spacing: .2em; color: #ff6b6b;
  }

  /* autonomous grid events (random injector) */
  .event.grid,
  .narration.grid {
    align-self: stretch; max-width: 100%;
    background: linear-gradient(180deg, rgba(124,255,178,.12), rgba(124,255,178,.04));
    border: 1px solid rgba(124,255,178,.28);
    border-left: 2px solid #7cffb2;
    border-radius: 3px 9px 9px 9px;
    padding: 10px 14px; color: #d8ffe8; white-space: pre-wrap;
  }
  .event.grid::before,
  .narration.grid::before {
    content: "⚡ GRID EVENT"; display: block; margin-bottom: 5px;
    font-family: "IBM Plex Mono", monospace; font-size: 9px;
    letter-spacing: .2em; color: #7cffb2;
  }

  /* tool telemetry */
  .tool {
    align-self: stretch; max-width: 100%;
    font-family: "IBM Plex Mono", monospace; font-size: 11px;
    color: var(--muted);
    display: flex; align-items: center; gap: 9px;
    padding: 5px 11px; border-radius: 4px;
    background: rgba(255,255,255,.012);
    border: 1px dashed var(--line);
  }
  .tool::before {
    content: "▸ TOOL"; color: var(--amber); letter-spacing: .12em;
    font-size: 9px; flex: none;
  }

  form {
    display: flex; gap: 9px; padding: 14px 16px 16px;
    border-top: 1px solid var(--line-soft);
    background: rgba(0,0,0,.25);
  }
  .inputwrap { flex: 1; position: relative; display: flex; align-items: center; }
  .inputwrap::before {
    content: "›"; position: absolute; left: 12px; color: var(--cyan);
    font-family: "IBM Plex Mono", monospace; font-size: 16px; font-weight: 600;
  }
  input {
    flex: 1; padding: 11px 12px 11px 26px;
    border-radius: 5px; border: 1px solid var(--line);
    background: #0a0e15; color: var(--text);
    font-family: "IBM Plex Mono", monospace; font-size: 13px;
    outline: none; transition: border-color .18s, box-shadow .18s;
  }
  input::placeholder { color: var(--dim); }
  input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 0 3px rgba(47,230,207,.08); }
  button {
    padding: 0 18px; border: 0; border-radius: 5px; cursor: pointer;
    background: linear-gradient(180deg, var(--cyan), var(--cyan-dim));
    color: #04201d; font-family: "Chakra Petch", sans-serif;
    font-weight: 700; font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    transition: filter .18s, transform .05s;
  }
  button:hover { filter: brightness(1.1); }
  button:active { transform: translateY(1px); }
</style>
</head>
<body data-status="">
<div id="left">
  <header>
    <div class="brand">
      <span class="mark">VOLT<b>IFY</b></span>
      <span class="sub">Grid Operations Agent</span>
    </div>
    <span id="status" class="">offline</span>
    <div id="rho">
      <span class="lbl">max&nbsp;ρ</span>
      <div class="track"><div class="fill" id="rhofill"></div></div>
      <span class="val" id="maxrho">—</span>
    </div>
    <span id="viewtoggle">full map</span>
  </header>
  <div id="gridwrap">
    <span class="bracket tl"></span><span class="bracket tr"></span>
    <span class="bracket bl"></span><span class="bracket br"></span>
    <iframe id="grid" src="about:blank"></iframe>
    <div id="emptygrid">awaiting agent run</div>
  </div>
</div>
<div id="right">
  <div id="commshead">
    <span class="t">Agent Comms</span>
    <span class="live">LIVE</span>
  </div>
  <div id="feed"></div>
  <form id="opform">
    <div class="inputwrap">
      <input id="opmsg" placeholder="Operator message..." autocomplete="off">
    </div>
    <button>Send</button>
  </form>
</div>
<script>
let nSteps = 0, zoomed = false, renders = {full: null, zoom: null};

function setRender() {
  const src = zoomed ? renders.zoom : renders.full;
  const frame = document.getElementById('grid');
  if (src && frame.getAttribute('data-src') !== src) {
    frame.src = '/' + src;
    frame.setAttribute('data-src', src);
    document.getElementById('emptygrid').classList.add('hidden');
  }
}

function setRho(rho) {
  if (rho == null) return;
  const fill = document.getElementById('rhofill');
  const pct = Math.max(0, Math.min(1, rho / 1.5)) * 100;   // track maps 0..1.5
  fill.style.width = pct + '%';
  fill.style.background = rho >= 1.0
    ? 'linear-gradient(90deg, #b3361f, var(--red))'
    : rho >= 0.85
      ? 'linear-gradient(90deg, #8a6410, var(--amber))'
      : 'linear-gradient(90deg, var(--cyan-dim), var(--cyan))';
  document.getElementById('maxrho').textContent = rho.toFixed(2);
}

document.getElementById('viewtoggle').onclick = () => {
  zoomed = !zoomed;
  document.getElementById('viewtoggle').textContent =
    zoomed ? 'full map' : 'zoom to fault';
  setRender();
};

async function poll() {
  try {
    const response = await fetch('/artifacts/run/steps.json?t=' + Date.now());
    const steps = await response.json();
    const feed = document.getElementById('feed');

function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function mdInline(s) {
  return s
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/__([^_]+)__/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>')
    .replace(/(^|[^_])_([^_]+)_/g, '$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function mdToHtml(src) {
  const lines = escapeHtml(src).split('\n');
  let html = '', list = null, inFence = false, fence = '';
  const closeList = () => { if (list) { html += '</' + list + '>'; list = null; } };
  for (const raw of lines) {
    if (/^\s*```/.test(raw)) {
      if (inFence) { html += fence + '</code></pre>'; inFence = false; fence = ''; }
      else { closeList(); html += '<pre><code>'; inFence = true; }
      continue;
    }
    if (inFence) { fence += raw + '\n'; continue; }
    const line = raw.trim();
    let m;
    if (m = line.match(/^(#{1,4})\s+(.*)$/)) { closeList(); const n = m[1].length; html += '<h' + n + '>' + mdInline(m[2]) + '</h' + n + '>'; continue; }
    if (m = line.match(/^>\s?(.*)$/)) { closeList(); html += '<blockquote>' + mdInline(m[1]) + '</blockquote>'; continue; }
    if (m = line.match(/^[-*•]\s+(.*)$/)) { if (list !== 'ul') { closeList(); list = 'ul'; html += '<ul>'; } html += '<li>' + mdInline(m[1]) + '</li>'; continue; }
    if (m = line.match(/^\d+[.)]\s+(.*)$/)) { if (list !== 'ol') { closeList(); list = 'ol'; html += '<ol>'; } html += '<li>' + mdInline(m[1]) + '</li>'; continue; }
    closeList();
    html += '<div class="ln">' + mdInline(line) + '</div>';
  }
  if (inFence) html += fence + '</code></pre>';
  closeList();
  return html;
}
    for (const step of steps.slice(nSteps)) {
      const div = document.createElement('div');
      if (step.kind === 'tool') {
        div.className = 'tool ' + (step.agent || 'ops');
        div.textContent = step.tool;
      } else {
        div.className = 'msg md ' + step.kind + ' ' + (step.agent || 'ops');
        div.innerHTML = mdToHtml(step.text || '');
      }
      feed.appendChild(div);
      if (step.render_full) renders.full = step.render_full;
      if (step.render_zoom) renders.zoom = step.render_zoom;
      if (step.grid_status) {
        const el = document.getElementById('status');
        el.textContent = step.grid_status;
        el.className = step.grid_status;
        document.body.dataset.status = step.grid_status;
        setRho(step.max_rho);
      }
    }
    if (steps.length > nSteps) {
      nSteps = steps.length;
      feed.scrollTop = feed.scrollHeight;
      setRender();
    }
  } catch (e) {
    /* Agent not started yet. */
  }
}
setInterval(poll, 1000);

document.getElementById('opform').onsubmit = async (event) => {
  event.preventDefault();
  const box = document.getElementById('opmsg');
  if (!box.value.trim()) return;
  let payload = {text: box.value.trim()};
  if (box.value.trim().startsWith('{')) {
    try {
      const parsed = JSON.parse(box.value.trim());
      if (parsed.kind === 'decision') payload = parsed;
    } catch (e) {
      payload = {text: box.value.trim()};
    }
  }
  await fetch('/inbox', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  box.value = '';
};
</script>
